# The base URL of the site; the only required configuration variable.
base_url = "https://Shanu-Kumawat.github.io/portfolio-site/"

# The site title and description; used in feeds by default.
title = "Shanu Kumawat - Developer & Explorer"
description = "Third-year engineering student, Flutter developer, open-source enthusiast, and lifelong learner exploring the intersections of code, mechanics, and real-world problem solving"

# The default language; used in feeds.
default_language = "en"

# The site theme to use.
theme = "terminimal"

# When set to "true", the Sass files in the `sass` directory in the site root are compiled.
compile_sass = true

# When set to "true", a feed is automatically generated.
generate_feeds = true

# When set to "true", a search index is built from the pages and section
# content for `default_language`.
build_search_index = false

# When set to "false", Sitemap.xml is not generated
generate_sitemap = true

# The taxonomies to be rendered for the site and their configuration of the default languages
taxonomies = [
    {name = "tags", feed = true},
]

[markdown]
# Whether smart punctuation is enabled (changing quotes, dashes, dots in their typographic form)
smart_punctuation = true

# Whether to set rel="noopener" for all external links
external_links_target_blank = true

[markdown.highlighting]
# When set to "true", missing highlight languages are treated as errors.
error_on_missing_language = false

# Whether to use inline hex colours (`inline`) or CSS classes (`class`)
style = "inline"

# Syntax highlighting theme
theme = "github-dark"

[extra]
# Site author
author = "Shanu Kumawat"

# Logo text (shown in header)
logo_text = "~/shanu"

# Theme colors
accent_color = "red"
background_color = "dark"

# Contact email
email = "contact@shanukumawat.com"

# Favicon
favicon = "/favicon.svg"

# Social links
github = "https://github.com/Shanu-Kumawat"
linkedin = "https://linkedin.com/in/shanukumawat"
twitter = "https://x.com/Shanu_Kumawat01"

# Open Graph / Social Sharing
default_og_image = "https://raw.githubusercontent.com/Shanu-Kumawat/Shanu-Kumawat/main/banner.png"

# Custom footer HTML
copyright_html = '''
<div class="footer-container">
  <div class="footer-main">
    <strong>Shanu Kumawat</strong> · Engineering Student & Developer · MNNIT Allahabad
  </div>
  <div class="footer-links">
    <a href="/blog">Posts</a> · <a href="/projects">Projects</a> · <a href="/socials">Contact</a>
  </div>
  <div class="footer-meta">
    © 2026 Shanu Kumawat · Built with <a href="https://www.getzola.org/" target="_blank" rel="noopener noreferrer">Zola</a> and <a href="https://github.com/pawroman/zola-theme-terminimal" target="_blank" rel="noopener noreferrer">Terminimal</a>
  </div>
</div>
'''

# Navigation menu
menu_items = [
    {name = "About Me", url = "$BASE_URL"},
    {name = "Journey", url = "$BASE_URL/journey"},
    {name = "Posts", url = "$BASE_URL/blog"},
    {name = "Projects", url = "$BASE_URL/projects"},
    {name = "Socials", url = "$BASE_URL/socials"},
    {name = "GitHub↗", url = "https://github.com/Shanu-Kumawat", newtab = true},
]

